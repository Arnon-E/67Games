<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fight Challenge – Stop at 67</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070F;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: #FF6B35;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 15px;
      color: #BFC3D9;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .code-box {
      background: rgba(255, 107, 53, 0.1);
      border: 1.5px solid rgba(255, 107, 53, 0.45);
      border-radius: 18px;
      padding: 20px 36px;
      margin-bottom: 36px;
      width: 100%;
      max-width: 320px;
    }
    .code-label {
      font-size: 11px;
      color: #6C728A;
      letter-spacing: 2.5px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .code-value {
      font-size: 38px;
      font-weight: 900;
      color: #FF6B35;
      letter-spacing: 10px;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.35);
    }
    .store-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 14px;
      background: transparent;
      color: #6C728A;
      border: 1.5px solid rgba(108, 114, 138, 0.35);
      border-radius: 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .status {
      margin-top: 28px;
      font-size: 13px;
      color: #6C728A;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="emoji">🥊</div>
  <h1>FIGHT CHALLENGE!</h1>
  <p class="subtitle">
    You've been challenged to Fight Mode<br>
    in <strong style="color:#ffffff">Stop at 67</strong>
  </p>

  <div class="code-box">
    <div class="code-label">INVITE CODE</div>
    <div class="code-value" id="code-display">------</div>
  </div>

  <a class="btn" id="open-btn">Open in Stop at 67</a>
  <a class="store-btn" id="store-link"
     href="https://play.google.com/store/apps/details?id=com.sixtysevengames.stop_at_67">
    Don't have the app? Download it
  </a>
  <p class="status" id="status"></p>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const pathSegs = window.location.pathname.split('/').filter(Boolean);
    const rawCode  = params.get('code') ||
                     (pathSegs.length >= 2 ? pathSegs[pathSegs.length - 1] : '');
    const code     = rawCode.trim().toUpperCase();

    const codeDisplay = document.getElementById('code-display');
    const openBtn     = document.getElementById('open-btn');
    const statusEl    = document.getElementById('status');

    if (code && /^[A-Z0-9]{6}$/.test(code)) {
      codeDisplay.textContent = code;

      const appUrl   = 'stopat67://fight?code=' + code;
      const storeUrl = document.getElementById('store-link').href;

      let launched = false;

      function launchApp() {
        if (launched) return;
        launched = true;

        statusEl.textContent = 'Opening Stop at 67\u2026';

        // If page stays visible for 2.5 s the app is not installed → go to store
        const timer = setTimeout(function () {
          statusEl.textContent = 'App not found. Redirecting to the store\u2026';
          window.location.href = storeUrl;
        }, 2500);

        // Page going hidden means the app opened → cancel store redirect
        function onHide() {
          if (document.hidden) {
            clearTimeout(timer);
            document.removeEventListener('visibilitychange', onHide);
          }
        }
        function onBlur() {
          clearTimeout(timer);
          window.removeEventListener('blur', onBlur);
        }

        document.addEventListener('visibilitychange', onHide);
        window.addEventListener('blur', onBlur);

        window.location.href = appUrl;
      }

      openBtn.addEventListener('click', launchApp);

      // Auto-launch after a short delay so the page renders first
      setTimeout(launchApp, 700);

    } else {
      codeDisplay.textContent = '?';
      statusEl.textContent = 'Invalid or missing invite code.';
      openBtn.style.display = 'none';
    }
  </script>
</body>
</html>
