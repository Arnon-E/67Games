name: stop_at_67
description: Stop at 67 - Precision timing game
publish_to: 'none'
version: 1.0.2+14

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  haptic_feedback: ^0.5.1+1
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0
  unity_ads_plugin: ^4.0.1
  purchases_flutter: ^8.0.0
  share_plus: ^10.1.0
  wakelock_plus: ^1.2.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  package_info_plus: ^9.0.0
  path_provider: ^2.1.4
  firebase_remote_config: ^5.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../appIcon_512.png"
  min_sdk_android: 21
